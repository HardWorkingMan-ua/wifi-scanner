name: Nightly C Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libnl-3-dev libnl-genl-3-dev
      - name: Build
        run: make

      - name: Run tests
        run: make check || echo "No tests defined"
      - name: Prepare artifact
        run: |
          mkdir -p release
          cp wifi-scanner release/
          ARTIFACT_NAME=wifi-scanner-nightly-$(date +%Y%m%d%H%M%S).tar.gz
          tar czf $ARTIFACT_NAME -C release wifi-scanner
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Set NIGHTLY_TAG
        run: echo "NIGHTLY_TAG=nightly-$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
      
      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NIGHTLY_TAG }}
          name: ${{ env.NIGHTLY_TAG }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #work pls
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NIGHTLY_TAG }}
          name: wifi-scanner-${{ env.NIGHTLY_TAG }}.tar.gz
          asset_path: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-$(date +%Y%m%d%H%M%S)
          name: ${{ env.ARTIFACT_NAME }}
          asset_path: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
