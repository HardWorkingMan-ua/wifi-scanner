name: Nightly Build

on:
  schedule:
    # Запуск щодня о 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Дозволяє запустити збірку вручну через вкладку Actions

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Потрібні дозволи для створення релізу
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnl-3-dev libnl-genl-3-dev

      - name: Build Project
        run: make

      - name: Create/Update Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            Automatic nightly build of WiFi Scanner.
            
            **Date of build:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
            
            ### How to use
            1. Download file `wifi-scanner`
            2. Make him executeble: `chmod +x wifi-scanner`
            3. Launch him with root permisions: `sudo ./wifi-scanner -i wlan0`
          files: wifi-scanner
          prerelease: true
          make_latest: true
          fail_on_unmatched_files: true
